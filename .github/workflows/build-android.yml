name: Build BritishSub VPN APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=BritishSub, O=BritishSub, C=GB"

      - name: Create full project
        run: |
          mkdir -p britishsub-app/app/src/main/java/com/britishsub/vpn
          mkdir -p britishsub-app/app/src/main/res/values
          mkdir -p britishsub-app/gradle/wrapper

          cat > britishsub-app/settings.gradle << 'EOF'
          rootProject.name = "BritishSubVPN"
          include ':app'
          EOF

          cat > britishsub-app/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          EOF

          cat > britishsub-app/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.britishsub.vpn"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file(System.getProperty("user.home") + "/.android/debug.keystore")
                      storePassword "android"
                      keyAlias "androiddebugkey"
                      keyPassword "android"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.wireguard.android:tunnel:1.0.20230706'
          }
          EOF

          cat > britishsub-app/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > britishsub-app/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > britishsub-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.britishsub.vpn">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.CHANGE_NETWORK_STATE"/>
              <application
                  android:allowBackup="true"
                  android:label="BritishSub VPN"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".BritishSubVpnService"
                      android:permission="android.permission.BIND_VPN_SERVICE"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="android.net.VpnService"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          cat > britishsub-app/app/src/main/java/com/britishsub/vpn/BritishSubVpnService.java << 'EOF'
          package com.britishsub.vpn;

          import android.content.Intent;
          import android.net.VpnService;
          import android.os.ParcelFileDescriptor;
          import android.util.Log;
          import java.io.*;
          import java.net.*;
          import java.nio.ByteBuffer;

          public class BritishSubVpnService extends VpnService {
              private static final String TAG = "BritishSubVPN";
              private ParcelFileDescriptor vpnInterface;
              private Thread vpnThread;
              private boolean running = false;

              public static final String ACTION_CONNECT = "com.britishsub.vpn.CONNECT";
              public static final String ACTION_DISCONNECT = "com.britishsub.vpn.DISCONNECT";

              private static final String SERVER_HOST = "95.179.237.55";
              private static final int SERVER_PORT = 51820;
              private static final String CLIENT_PRIVATE_KEY = "uNNN8NPjhqASHHIlDLw+14eyPH/uk8x/INu9qTuklW8=";
              private static final String SERVER_PUBLIC_KEY = "0ZgusCEXOLYtAM/7hEGDKwqub6GsPiGdUpDkISSqEjY=";

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent != null && ACTION_DISCONNECT.equals(intent.getAction())) {
                      disconnect();
                      return START_NOT_STICKY;
                  }
                  connect();
                  return START_STICKY;
              }

              private void connect() {
                  try {
                      Builder builder = new Builder();
                      builder.setMtu(1420);
                      builder.addAddress("10.0.0.2", 32);
                      builder.addDnsServer("1.1.1.1");
                      builder.addDnsServer("8.8.8.8");
                      builder.addRoute("0.0.0.0", 0);
                      builder.setSession("BritishSub VPN");
                      builder.setBlocking(true);
                      vpnInterface = builder.establish();

                      if (vpnInterface == null) {
                          sendBroadcast(new Intent("com.britishsub.vpn.VPN_DISCONNECTED"));
                          return;
                      }

                      running = true;
                      vpnThread = new Thread(this::tunnel);
                      vpnThread.start();

                      sendBroadcast(new Intent("com.britishsub.vpn.VPN_CONNECTED"));

                  } catch (Exception e) {
                      Log.e(TAG, "Connect error: " + e.getMessage());
                      disconnect();
                  }
              }

              private void tunnel() {
                  try {
                      InetAddress serverAddr = InetAddress.getByName(SERVER_HOST);
                      DatagramSocket udpSocket = new DatagramSocket();
                      protect(udpSocket);
                      udpSocket.connect(serverAddr, SERVER_PORT);
                      udpSocket.setSoTimeout(100);

                      FileInputStream in = new FileInputStream(vpnInterface.getFileDescriptor());
                      FileOutputStream out = new FileOutputStream(vpnInterface.getFileDescriptor());

                      byte[] buf = new byte[32767];

                      while (running) {
                          // Read from VPN interface and send to server
                          int len = in.read(buf);
                          if (len > 0) {
                              DatagramPacket pkt = new DatagramPacket(buf, len, serverAddr, SERVER_PORT);
                              try { udpSocket.send(pkt); } catch (Exception ignored) {}
                          }

                          // Read from server and write to VPN interface
                          DatagramPacket recv = new DatagramPacket(buf, buf.length);
                          try {
                              udpSocket.receive(recv);
                              if (recv.getLength() > 0) {
                                  out.write(recv.getData(), 0, recv.getLength());
                              }
                          } catch (SocketTimeoutException ignored) {}
                      }
                      udpSocket.close();
                  } catch (Exception e) {
                      Log.e(TAG, "Tunnel error: " + e.getMessage());
                      disconnect();
                  }
              }

              private void disconnect() {
                  running = false;
                  if (vpnThread != null) { vpnThread.interrupt(); vpnThread = null; }
                  try { if (vpnInterface != null) { vpnInterface.close(); vpnInterface = null; } } catch (Exception ignored) {}
                  sendBroadcast(new Intent("com.britishsub.vpn.VPN_DISCONNECTED"));
                  stopSelf();
              }

              @Override
              public void onDestroy() { disconnect(); super.onDestroy(); }
          }
          EOF

          cat > britishsub-app/app/src/main/java/com/britishsub/vpn/MainActivity.java << 'EOF'
          package com.britishsub.vpn;

          import android.app.Activity;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.net.VpnService;
          import android.os.Bundle;
          import android.widget.*;
          import android.graphics.Color;
          import android.view.Gravity;
          import java.net.NetworkInterface;
          import java.util.Collections;
          import java.util.List;
          import okhttp3.OkHttpClient;
          import okhttp3.Request;
          import okhttp3.Response;
          import org.json.JSONObject;

          public class MainActivity extends Activity {
              private static final int VPN_REQUEST_CODE = 1;
              private boolean connected = false;
              private Button connectBtn, refreshBtn;
              private TextView statusText, macText, messageText;
              private LinearLayout connectLayout;
              private static final String API = "https://britishsub-vpn-api.mounirmakerz.workers.dev";

              private BroadcastReceiver vpnReceiver = new BroadcastReceiver() {
                  @Override
                  public void onReceive(Context context, Intent intent) {
                      if ("com.britishsub.vpn.VPN_CONNECTED".equals(intent.getAction())) {
                          connected = true;
                          connectBtn.setText("DISCONNECT");
                          statusText.setText("● Connected");
                          statusText.setTextColor(Color.parseColor("#00D7FF"));
                      } else if ("com.britishsub.vpn.VPN_DISCONNECTED".equals(intent.getAction())) {
                          connected = false;
                          connectBtn.setText("CONNECT");
                          statusText.setText("● Disconnected");
                          statusText.setTextColor(Color.RED);
                      }
                  }
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  IntentFilter filter = new IntentFilter();
                  filter.addAction("com.britishsub.vpn.VPN_CONNECTED");
                  filter.addAction("com.britishsub.vpn.VPN_DISCONNECTED");
                  registerReceiver(vpnReceiver, filter);

                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setGravity(Gravity.CENTER);
                  layout.setBackgroundColor(Color.parseColor("#0F121B"));
                  layout.setPadding(60, 60, 60, 60);

                  TextView title = new TextView(this);
                  title.setText("BritishSub VPN");
                  title.setTextColor(Color.parseColor("#00D7FF"));
                  title.setTextSize(28);
                  title.setGravity(Gravity.CENTER);
                  title.setPadding(0, 0, 0, 20);

                  TextView macLabel = new TextView(this);
                  macLabel.setText("Your Device ID:");
                  macLabel.setTextColor(Color.parseColor("#888888"));
                  macLabel.setTextSize(13);
                  macLabel.setGravity(Gravity.CENTER);

                  macText = new TextView(this);
                  macText.setText(getMacAddress());
                  macText.setTextColor(Color.parseColor("#00D7FF"));
                  macText.setTextSize(14);
                  macText.setGravity(Gravity.CENTER);
                  macText.setPadding(0, 4, 0, 30);

                  messageText = new TextView(this);
                  messageText.setText("Tap Refresh to check activation");
                  messageText.setTextColor(Color.parseColor("#888888"));
                  messageText.setTextSize(14);
                  messageText.setGravity(Gravity.CENTER);
                  messageText.setPadding(0, 0, 0, 20);

                  refreshBtn = new Button(this);
                  refreshBtn.setText("REFRESH");
                  refreshBtn.setTextColor(Color.parseColor("#0F121B"));
                  refreshBtn.setBackgroundColor(Color.parseColor("#00D7FF"));
                  refreshBtn.setTextSize(16);
                  refreshBtn.setPadding(60, 20, 60, 20);

                  connectLayout = new LinearLayout(this);
                  connectLayout.setOrientation(LinearLayout.VERTICAL);
                  connectLayout.setGravity(Gravity.CENTER);
                  connectLayout.setVisibility(android.view.View.GONE);

                  statusText = new TextView(this);
                  statusText.setText("● Disconnected");
                  statusText.setTextColor(Color.RED);
                  statusText.setTextSize(16);
                  statusText.setGravity(Gravity.CENTER);
                  statusText.setPadding(0, 20, 0, 20);

                  connectBtn = new Button(this);
                  connectBtn.setText("CONNECT");
                  connectBtn.setTextColor(Color.parseColor("#0F121B"));
                  connectBtn.setBackgroundColor(Color.parseColor("#00D7FF"));
                  connectBtn.setTextSize(18);
                  connectBtn.setPadding(60, 30, 60, 30);

                  connectLayout.addView(statusText);
                  connectLayout.addView(connectBtn);

                  refreshBtn.setOnClickListener(v -> checkActivation());
                  connectBtn.setOnClickListener(v -> {
                      if (!connected) startVpn();
                      else stopVpn();
                  });

                  layout.addView(title);
                  layout.addView(macLabel);
                  layout.addView(macText);
                  layout.addView(messageText);
                  layout.addView(refreshBtn);
                  layout.addView(connectLayout);
                  setContentView(layout);
              }

              private void startVpn() {
                  Intent intent = VpnService.prepare(this);
                  if (intent != null) startActivityForResult(intent, VPN_REQUEST_CODE);
                  else onActivityResult(VPN_REQUEST_CODE, RESULT_OK, null);
              }

              private void stopVpn() {
                  Intent intent = new Intent(this, BritishSubVpnService.class);
                  intent.setAction(BritishSubVpnService.ACTION_DISCONNECT);
                  startService(intent);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == VPN_REQUEST_CODE && resultCode == RESULT_OK) {
                      Intent intent = new Intent(this, BritishSubVpnService.class);
                      intent.setAction(BritishSubVpnService.ACTION_CONNECT);
                      startService(intent);
                  }
              }

              private void checkActivation() {
                  String mac = getMacAddress();
                  refreshBtn.setText("Checking...");
                  refreshBtn.setEnabled(false);
                  new Thread(() -> {
                      try {
                          OkHttpClient client = new OkHttpClient();
                          Request request = new Request.Builder()
                              .url(API + "/check?mac=" + mac)
                              .build();
                          Response response = client.newCall(request).execute();
                          String body = response.body().string();
                          JSONObject json = new JSONObject(body);
                          runOnUiThread(() -> {
                              try {
                                  if (json.getBoolean("approved")) {
                                      messageText.setText("✅ Activated until " + json.getString("expiry"));
                                      messageText.setTextColor(Color.parseColor("#00D7FF"));
                                      connectLayout.setVisibility(android.view.View.VISIBLE);
                                  } else {
                                      messageText.setText("❌ " + json.getString("reason"));
                                      messageText.setTextColor(Color.RED);
                                      connectLayout.setVisibility(android.view.View.GONE);
                                  }
                              } catch (Exception e) {
                                  messageText.setText("Error: " + e.getMessage());
                              }
                              refreshBtn.setText("REFRESH");
                              refreshBtn.setEnabled(true);
                          });
                      } catch (Exception e) {
                          runOnUiThread(() -> {
                              messageText.setText("Connection error. Try again.");
                              messageText.setTextColor(Color.RED);
                              refreshBtn.setText("REFRESH");
                              refreshBtn.setEnabled(true);
                          });
                      }
                  }).start();
              }

              private String getMacAddress() {
                  try {
                      List<NetworkInterface> interfaces = Collections.list(NetworkInterface.getNetworkInterfaces());
                      for (NetworkInterface nif : interfaces) {
                          if (!nif.getName().equalsIgnoreCase("wlan0")) continue;
                          byte[] macBytes = nif.getHardwareAddress();
                          if (macBytes == null) continue;
                          StringBuilder sb = new StringBuilder();
                          for (byte b : macBytes) sb.append(String.format("%02X:", b));
                          if (sb.length() > 0) sb.deleteCharAt(sb.length() - 1);
                          return sb.toString();
                      }
                  } catch (Exception e) { e.printStackTrace(); }
                  return "02:00:00:00:00:00";
              }

              @Override
              protected void onDestroy() {
                  unregisterReceiver(vpnReceiver);
                  super.onDestroy();
              }
          }
          EOF

          cat > britishsub-app/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">#00D7FF</item>
              </style>
          </resources>
          EOF

      - name: Build APK
        run: |
          cd britishsub-app
          curl -L https://services.gradle.org/distributions/gradle-7.6.1-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-7.6.1/bin/gradle assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BritishSub-VPN
          path: britishsub-app/app/build/outputs/apk/release/*.apk
