              private Runnable timerRunnable = new Runnable() {
                  @Override public void run() {
                      long e = System.currentTimeMillis() - startTime;
                      timerText.setText(String.format(Locale.US, "%02d:%02d:%02d",
                          e/3600000, (e%3600000)/60000, (e%60000)/1000));
