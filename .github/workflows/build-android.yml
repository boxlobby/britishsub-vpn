                  return t;
              }

              private TextView makeSidebarValue(String text) {
                  TextView t = new TextView(this);
                  t.setText(text);
                  t.setTextColor(Color.WHITE);
                  t.setTextSize(14);
                  t.setTypeface(null, Typeface.BOLD);
                  return t;
              }

              private View makeSpacer() {
                  View v = new View(this);
                  v.setLayoutParams(new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT, dp(16)));
                  return v;
              }

              private void openSidebar() {
                  overlayView.setVisibility(View.VISIBLE);
                  overlayView.setAlpha(0f);
                  overlayView.animate().alpha(1f).setDuration(250).start();
                  sidebarLayout.animate().translationX(0).setDuration(300)
                      .setInterpolator(new DecelerateInterpolator()).start();
              }

              private void closeSidebar() {
                  sidebarLayout.animate().translationX(-dp(280)).setDuration(250)
                      .setInterpolator(new DecelerateInterpolator())
                      .withEndAction(() -> overlayView.setVisibility(View.GONE)).start();
                  overlayView.animate().alpha(0f).setDuration(250).start();
              }

              private void startPulse() {
                  stopPulse();
                  pulseSet = new AnimatorSet();
                  ObjectAnimator s1x = anim(ring1, "scaleX", 1f, 1.12f, 2200);
                  ObjectAnimator s1y = anim(ring1, "scaleY", 1f, 1.12f, 2200);
                  ObjectAnimator a1  = anim(ring1, "alpha",  1f, 0.3f,  2200);
                  ObjectAnimator s2x = anim(ring2, "scaleX", 1f, 1.18f, 2200);
                  ObjectAnimator s2y = anim(ring2, "scaleY", 1f, 1.18f, 2200);
                  ObjectAnimator a2  = anim(ring2, "alpha",  1f, 0.2f,  2200);
                  ObjectAnimator s3x = anim(ring3, "scaleX", 1f, 1.25f, 2200);
                  ObjectAnimator s3y = anim(ring3, "scaleY", 1f, 1.25f, 2200);
                  ObjectAnimator a3  = anim(ring3, "alpha",  1f, 0.1f,  2200);
                  s2x.setStartDelay(200); s2y.setStartDelay(200); a2.setStartDelay(200);
                  s3x.setStartDelay(400); s3y.setStartDelay(400); a3.setStartDelay(400);
                  pulseSet.playTogether(s1x,s1y,a1,s2x,s2y,a2,s3x,s3y,a3);
                  pulseSet.start();
              }

              private ObjectAnimator anim(View v, String prop, float from, float to, long dur) {
                  ObjectAnimator a = ObjectAnimator.ofFloat(v, prop, from, to, from);
                  a.setDuration(dur);
                  a.setRepeatCount(ValueAnimator.INFINITE);
                  a.setInterpolator(new AccelerateDecelerateInterpolator());
                  return a;
              }

              private void stopPulse() {
                  if (pulseSet != null) pulseSet.cancel();
                  for (View r : new View[]{ring1, ring2, ring3}) {
                      r.setScaleX(1f); r.setScaleY(1f); r.setAlpha(1f);
                  }
              }

              private void onConnected() {
                  connected = true; connecting = false;
                  statusText.setText("CONNECTED");
                  statusText.setTextColor(Color.parseColor("#00D7FF"));
                  timerText.setTextColor(Color.WHITE);
                  connectBtnText.setText("DISCONNECT");
                  connectBtnText.setTextColor(Color.parseColor("#FF4444"));
                  GradientDrawable dBg = new GradientDrawable();
                  dBg.setShape(GradientDrawable.RECTANGLE);
                  dBg.setCornerRadius(dp(14));
                  dBg.setColor(Color.parseColor("#1A0A0A"));
                  dBg.setStroke(dp(2), Color.parseColor("#FF4444"));
                  connectBtnWrapper.setBackground(dBg);
                  GradientDrawable pBg = new GradientDrawable();
                  pBg.setShape(GradientDrawable.OVAL);
                  pBg.setColor(Color.parseColor("#0A2020"));
                  pBg.setStroke(dp(2), Color.parseColor("#00D7FF"));
                  powerBtn.setBackground(pBg);
                  startPulse();
                  startTime = System.currentTimeMillis();
                  timerHandler.post(timerRunnable);
              }

              private void onDisconnected() {
                  connected = false; connecting = false;
                  statusText.setText("DISCONNECTED");
                  statusText.setTextColor(Color.parseColor("#FF4444"));
                  timerText.setTextColor(Color.parseColor("#333D52"));
                  timerText.setText("00:00:00");
                  connectBtnText.setText("CONNECT");
                  connectBtnText.setTextColor(Color.parseColor("#0A0D1A"));
                  GradientDrawable cBg = new GradientDrawable();
                  cBg.setShape(GradientDrawable.RECTANGLE);
                  cBg.setCornerRadius(dp(14));
                  cBg.setColor(Color.parseColor("#00D7FF"));
                  connectBtnWrapper.setBackground(cBg);
                  GradientDrawable pBg = new GradientDrawable();
                  pBg.setShape(GradientDrawable.OVAL);
                  pBg.setColor(Color.parseColor("#111827"));
                  pBg.setStroke(dp(2), Color.parseColor("#00D7FF"));
                  powerBtn.setBackground(pBg);
                  stopPulse();
                  timerHandler.removeCallbacks(timerRunnable);
              }

              private void startVpn() {
                  try {
                      connecting = true;
                      statusText.setText("CONNECTING...");
                      statusText.setTextColor(Color.parseColor("#00D7FF"));
                      connectBtnText.setText("CONNECTING...");
                      connectBtnText.setTextColor(Color.parseColor("#00D7FF"));
                      GradientDrawable cgBg = new GradientDrawable();
                      cgBg.setShape(GradientDrawable.RECTANGLE);
                      cgBg.setCornerRadius(dp(14));
                      cgBg.setColor(Color.parseColor("#0A2030"));
                      cgBg.setStroke(dp(1), Color.parseColor("#00D7FF44"));
                      connectBtnWrapper.setBackground(cgBg);
                      startPulse();
                      Intent intent = VpnService.prepare(this);
                      if (intent != null) startActivityForResult(intent, VPN_REQUEST_CODE);
                      else onActivityResult(VPN_REQUEST_CODE, RESULT_OK, null);
                  } catch (Exception e) {
                      onDisconnected();
                      messageText.setText("Error: " + e.getMessage());
                      messageText.setTextColor(Color.parseColor("#FF4444"));
                  }
              }

              private void stopVpn() {
                  Intent intent = new Intent(this, BritishSubVpnService.class);
                  intent.setAction(BritishSubVpnService.ACTION_DISCONNECT);
                  startService(intent);
              }

              @Override
              protected void onActivityResult(int req, int res, Intent data) {
                  if (req == VPN_REQUEST_CODE && res == RESULT_OK) {
                      Intent i = new Intent(this, BritishSubVpnService.class);
                      i.setAction(BritishSubVpnService.ACTION_CONNECT);
                      startService(i);
                  } else { onDisconnected(); }
              }

              private void checkActivation() {
                  String mac = macAddress;
                  messageText.setText("Checking activation...");
                  messageText.setTextColor(Color.parseColor("#4A5568"));
                  new Thread(() -> {
                      try {
                          OkHttpClient client = new OkHttpClient();
                          Request req = new Request.Builder().url(API + "/check?mac=" + mac).build();
                          Response res = client.newCall(req).execute();
                          String body = res.body().string();
                          JSONObject json = new JSONObject(body);
                          runOnUiThread(() -> {
                              try {
                                  if (json.getBoolean("approved")) {
                                      String expiry = json.getString("expiry");
                                      messageText.setText("Active until " + expiry);
                                      messageText.setTextColor(Color.parseColor("#00D7FF"));
                                      if (expiryText != null) expiryText.setText("Active until " + expiry);
                                      connectLayout.setVisibility(View.VISIBLE);
                                  } else {
                                      messageText.setText(json.getString("reason"));
                                      messageText.setTextColor(Color.parseColor("#FF4444"));
                                      if (expiryText != null) expiryText.setText("Not activated");
                                      connectLayout.setVisibility(View.GONE);
                                  }
                              } catch (Exception e) { messageText.setText("Error checking"); }
                          });
                      } catch (Exception e) {
                          runOnUiThread(() -> {
                              messageText.setText("Connection error. Try again.");
                              messageText.setTextColor(Color.parseColor("#FF4444"));
                          });
                      }
                  }).start();
              }

              private String getMacAddress() {
                  try {
                      List<NetworkInterface> interfaces = Collections.list(NetworkInterface.getNetworkInterfaces());
                      for (NetworkInterface nif : interfaces) {
                          if (!nif.getName().equalsIgnoreCase("wlan0")) continue;
                          byte[] mac = nif.getHardwareAddress();
                          if (mac == null) continue;
                          StringBuilder sb = new StringBuilder();
                          for (byte b : mac) sb.append(String.format("%02X:", b));
                          if (sb.length() > 0) sb.deleteCharAt(sb.length()-1);
                          return sb.toString();
                      }
                  } catch (Exception e) { e.printStackTrace(); }
                  return "02:00:00:00:00:00";
              }

              @Override protected void onDestroy() {
                  unregisterReceiver(vpnReceiver);
                  timerHandler.removeCallbacks(timerRunnable);
                  super.onDestroy();
              }
          }
