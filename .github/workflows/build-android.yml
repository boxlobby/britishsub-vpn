name: Build BritishSub VPN APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Build Android APK
        working-directory: client
        run: npm run action -- build/android

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: BritishSub-VPN
          path: client/build/android/**/*.apk
