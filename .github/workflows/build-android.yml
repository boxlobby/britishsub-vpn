name: Build BritishSub VPN APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=BritishSub, O=BritishSub, C=GB"

      - name: Create full project
        run: |
          mkdir -p britishsub-app/app/src/main/java/com/britishsub/vpn
          mkdir -p britishsub-app/app/src/main/res/values
          mkdir -p britishsub-app/app/src/main/res/raw
          mkdir -p britishsub-app/gradle/wrapper

          cat > britishsub-app/settings.gradle << 'EOF'
          rootProject.name = "BritishSubVPN"
          include ':app'
          EOF

          cat > britishsub-app/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          cat > britishsub-app/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.britishsub.vpn"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file(System.getProperty("user.home") + "/.android/debug.keystore")
                      storePassword "android"
                      keyAlias "androiddebugkey"
                      keyPassword "android"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
          }
          EOF

          cat > britishsub-app/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > britishsub-app/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > britishsub-app/app/src/main/res/raw/wg_config.conf << 'EOF'
          [Interface]
          PrivateKey = uNNN8NPjhqASHHIlDLw+14eyPH/uk8x/INu9qTuklW8=
          Address = 10.0.0.2/32
          DNS = 1.1.1.1

          [Peer]
          PublicKey = 0ZgusCEXOLYtAM/7hEGDKwqub6GsPiGdUpDkISSqEjY=
          Endpoint = 95.179.237.55:51820
          AllowedIPs = 0.0.0.0/0
          PersistentKeepalive = 25
          EOF

          cat > britishsub-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.britishsub.vpn">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES"/>
              <application
                  android:allowBackup="true"
                  android:label="BritishSub VPN"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > britishsub-app/app/src/main/java/com/britishsub/vpn/MainActivity.java << 'EOF'
          package com.britishsub.vpn;

          import android.app.Activity;
          import android.app.AlertDialog;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Environment;
          import android.provider.Settings;
          import android.widget.*;
          import android.graphics.Color;
          import android.view.Gravity;
          import java.io.*;
          import java.net.NetworkInterface;
          import java.util.Collections;
          import java.util.List;
          import okhttp3.OkHttpClient;
          import okhttp3.Request;
          import okhttp3.Response;
          import org.json.JSONObject;

          public class MainActivity extends Activity {
              private Button connectBtn, refreshBtn;
              private TextView statusText, macText, messageText;
              private LinearLayout connectLayout;
              private boolean isConnected = false;
              private static final String API = "https://britishsub-vpn-api.mounirmakerz.workers.dev";
              private static final String WG_PACKAGE = "com.wireguard.android";
              private static final int INSTALL_REQUEST = 100;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setGravity(Gravity.CENTER);
                  layout.setBackgroundColor(Color.parseColor("#0F121B"));
                  layout.setPadding(60, 60, 60, 60);

                  TextView title = new TextView(this);
                  title.setText("BritishSub VPN");
                  title.setTextColor(Color.parseColor("#00D7FF"));
                  title.setTextSize(28);
                  title.setGravity(Gravity.CENTER);
                  title.setPadding(0, 0, 0, 20);

                  TextView macLabel = new TextView(this);
                  macLabel.setText("Your Device ID:");
                  macLabel.setTextColor(Color.parseColor("#888888"));
                  macLabel.setTextSize(13);
                  macLabel.setGravity(Gravity.CENTER);

                  macText = new TextView(this);
                  macText.setText(getMacAddress());
                  macText.setTextColor(Color.parseColor("#00D7FF"));
                  macText.setTextSize(14);
                  macText.setGravity(Gravity.CENTER);
                  macText.setPadding(0, 4, 0, 30);

                  messageText = new TextView(this);
                  messageText.setText("Tap Refresh to check activation");
                  messageText.setTextColor(Color.parseColor("#888888"));
                  messageText.setTextSize(14);
                  messageText.setGravity(Gravity.CENTER);
                  messageText.setPadding(0, 0, 0, 20);

                  refreshBtn = new Button(this);
                  refreshBtn.setText("REFRESH");
                  refreshBtn.setTextColor(Color.parseColor("#0F121B"));
                  refreshBtn.setBackgroundColor(Color.parseColor("#00D7FF"));
                  refreshBtn.setTextSize(16);
                  refreshBtn.setPadding(60, 20, 60, 20);

                  connectLayout = new LinearLayout(this);
                  connectLayout.setOrientation(LinearLayout.VERTICAL);
                  connectLayout.setGravity(Gravity.CENTER);
                  connectLayout.setVisibility(android.view.View.GONE);

                  statusText = new TextView(this);
                  statusText.setText("● Disconnected");
                  statusText.setTextColor(Color.RED);
                  statusText.setTextSize(16);
                  statusText.setGravity(Gravity.CENTER);
                  statusText.setPadding(0, 20, 0, 20);

                  connectBtn = new Button(this);
                  connectBtn.setText("CONNECT");
                  connectBtn.setTextColor(Color.parseColor("#0F121B"));
                  connectBtn.setBackgroundColor(Color.parseColor("#00D7FF"));
                  connectBtn.setTextSize(18);
                  connectBtn.setPadding(60, 30, 60, 30);

                  connectLayout.addView(statusText);
                  connectLayout.addView(connectBtn);

                  refreshBtn.setOnClickListener(v -> checkActivation());
                  connectBtn.setOnClickListener(v -> {
                      if (!isConnected) connectVpn();
                      else disconnectVpn();
                  });

                  layout.addView(title);
                  layout.addView(macLabel);
                  layout.addView(macText);
                  layout.addView(messageText);
                  layout.addView(refreshBtn);
                  layout.addView(connectLayout);
                  setContentView(layout);
              }

              private boolean isWireGuardInstalled() {
                  try {
                      getPackageManager().getPackageInfo(WG_PACKAGE, 0);
                      return true;
                  } catch (PackageManager.NameNotFoundException e) {
                      return false;
                  }
              }

              private void connectVpn() {
                  if (!isWireGuardInstalled()) {
                      showInstallWireGuardDialog();
                      return;
                  }
                  importAndConnect();
              }

              private void showInstallWireGuardDialog() {
                  new AlertDialog.Builder(this)
                      .setTitle("Setup Required")
                      .setMessage("BritishSub VPN needs to install a small component to connect. Tap OK to continue.")
                      .setPositiveButton("OK", (d, w) -> {
                          Intent intent = new Intent(Intent.ACTION_VIEW,
                              Uri.parse("market://details?id=" + WG_PACKAGE));
                          intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          try {
                              startActivity(intent);
                          } catch (Exception e) {
                              Intent webIntent = new Intent(Intent.ACTION_VIEW,
                                  Uri.parse("https://play.google.com/store/apps/details?id=" + WG_PACKAGE));
                              startActivity(webIntent);
                          }
                      })
                      .setNegativeButton("Cancel", null)
                      .show();
              }

              private void importAndConnect() {
                  try {
                      // Write WireGuard config to file
                      File configFile = new File(getExternalFilesDir(null), "britishsub.conf");
                      InputStream is = getResources().openRawResource(R.raw.wg_config);
                      FileOutputStream fos = new FileOutputStream(configFile);
                      byte[] buffer = new byte[1024];
                      int len;
                      while ((len = is.read(buffer)) != -1) {
                          fos.write(buffer, 0, len);
                      }
                      fos.close();
                      is.close();

                      // Import config into WireGuard
                      Uri fileUri = Uri.fromFile(configFile);
                      Intent intent = new Intent(Intent.ACTION_VIEW);
                      intent.setDataAndType(fileUri, "application/octet-stream");
                      intent.setPackage(WG_PACKAGE);
                      intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                      startActivityForResult(intent, INSTALL_REQUEST);

                  } catch (Exception e) {
                      messageText.setText("Error: " + e.getMessage());
                      messageText.setTextColor(Color.RED);
                  }
              }

              private void disconnectVpn() {
                  // Open WireGuard to disconnect
                  Intent intent = getPackageManager().getLaunchIntentForPackage(WG_PACKAGE);
                  if (intent != null) startActivity(intent);
                  isConnected = false;
                  connectBtn.setText("CONNECT");
                  statusText.setText("● Disconnected");
                  statusText.setTextColor(Color.RED);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == INSTALL_REQUEST) {
                      isConnected = true;
                      connectBtn.setText("DISCONNECT");
                      statusText.setText("● Connected");
                      statusText.setTextColor(Color.parseColor("#00D7FF"));
                  }
              }

              private void checkActivation() {
                  String mac = getMacAddress();
                  refreshBtn.setText("Checking...");
                  refreshBtn.setEnabled(false);
                  new Thread(() -> {
                      try {
                          OkHttpClient client = new OkHttpClient();
                          Request request = new Request.Builder()
                              .url(API + "/check?mac=" + mac)
                              .build();
                          Response response = client.newCall(request).execute();
                          String body = response.body().string();
                          JSONObject json = new JSONObject(body);
                          runOnUiThread(() -> {
                              try {
                                  if (json.getBoolean("approved")) {
                                      messageText.setText("✅ Activated until " + json.getString("expiry"));
                                      messageText.setTextColor(Color.parseColor("#00D7FF"));
                                      connectLayout.setVisibility(android.view.View.VISIBLE);
                                  } else {
                                      messageText.setText("❌ " + json.getString("reason"));
                                      messageText.setTextColor(Color.RED);
                                      connectLayout.setVisibility(android.view.View.GONE);
                                  }
                              } catch (Exception e) {
                                  messageText.setText("Error: " + e.getMessage());
                              }
                              refreshBtn.setText("REFRESH");
                              refreshBtn.setEnabled(true);
                          });
                      } catch (Exception e) {
                          runOnUiThread(() -> {
                              messageText.setText("Connection error. Try again.");
                              messageText.setTextColor(Color.RED);
                              refreshBtn.setText("REFRESH");
                              refreshBtn.setEnabled(true);
                          });
                      }
                  }).start();
              }

              private String getMacAddress() {
                  try {
                      List<NetworkInterface> interfaces = Collections.list(NetworkInterface.getNetworkInterfaces());
                      for (NetworkInterface nif : interfaces) {
                          if (!nif.getName().equalsIgnoreCase("wlan0")) continue;
                          byte[] macBytes = nif.getHardwareAddress();
                          if (macBytes == null) continue;
                          StringBuilder sb = new StringBuilder();
                          for (byte b : macBytes) sb.append(String.format("%02X:", b));
                          if (sb.length() > 0) sb.deleteCharAt(sb.length() - 1);
                          return sb.toString();
                      }
                  } catch (Exception e) { e.printStackTrace(); }
                  return "02:00:00:00:00:00";
              }
          }
          EOF

          cat > britishsub-app/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">#00D7FF</item>
              </style>
          </resources>
          EOF

      - name: Build APK
        run: |
          cd britishsub-app
          curl -L https://services.gradle.org/distributions/gradle-7.6.1-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-7.6.1/bin/gradle assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BritishSub-VPN
          path: britishsub-app/app/build/outputs/apk/release/*.apk
