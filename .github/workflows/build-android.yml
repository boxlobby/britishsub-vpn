name: Build BritishSub VPN APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=BritishSub, O=BritishSub, C=GB"

      - name: Download app icon
        run: |
          for dir in xxxhdpi xxhdpi xhdpi hdpi mdpi; do
            mkdir -p britishsub-app/app/src/main/res/mipmap-${dir}
          done
          curl -L "https://pub-f723409cbfab46caa18309b26581197b.r2.dev/favicon.png" -o /tmp/icon.png
          for dir in xxxhdpi xxhdpi xhdpi hdpi mdpi; do
            cp /tmp/icon.png britishsub-app/app/src/main/res/mipmap-${dir}/ic_launcher.png
            cp /tmp/icon.png britishsub-app/app/src/main/res/mipmap-${dir}/ic_launcher_round.png
          done
          mkdir -p britishsub-app/app/src/main/assets
          cp /tmp/icon.png britishsub-app/app/src/main/assets/crown.png

      - name: Create full project
        run: |
          mkdir -p britishsub-app/app/src/main/java/com/britishsub/vpn
          mkdir -p britishsub-app/app/src/main/res/values
          mkdir -p britishsub-app/gradle/wrapper

          cat > britishsub-app/settings.gradle << 'EOF'
          rootProject.name = "BritishSubVPN"
          include ':app'
          EOF

          cat > britishsub-app/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          cat > britishsub-app/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.britishsub.vpn'
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.britishsub.vpn"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file(System.getProperty("user.home") + "/.android/debug.keystore")
                      storePassword "android"
                      keyAlias "androiddebugkey"
                      keyPassword "android"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.wireguard.android:tunnel:1.0.20230706'
          }
          EOF

          cat > britishsub-app/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > britishsub-app/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > britishsub-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <application
                  android:allowBackup="true"
                  android:label="BritishSub VPN"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".BritishSubVpnService"
                      android:permission="android.permission.BIND_VPN_SERVICE"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="android.net.VpnService"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          cat > britishsub-app/app/src/main/java/com/britishsub/vpn/BritishSubVpnService.java << 'EOF'
          package com.britishsub.vpn;

          import android.content.Intent;
          import android.util.Log;
          import com.wireguard.android.backend.GoBackend;
          import com.wireguard.android.backend.Tunnel;
          import com.wireguard.config.Config;
          import java.io.BufferedReader;
          import java.io.StringReader;

          public class BritishSubVpnService extends android.net.VpnService {
              private static final String TAG = "BritishSubVPN";
              public static final String ACTION_CONNECT = "com.britishsub.vpn.CONNECT";
              public static final String ACTION_DISCONNECT = "com.britishsub.vpn.DISCONNECT";

              private static final String WG_CONFIG =
                  "[Interface]\n" +
                  "PrivateKey = uNNN8NPjhqASHHIlDLw+14eyPH/uk8x/INu9qTuklW8=\n" +
                  "Address = 10.0.0.2/32\n" +
                  "DNS = 1.1.1.1\n\n" +
                  "[Peer]\n" +
                  "PublicKey = 0ZgusCEXOLYtAM/7hEGDKwqub6GsPiGdUpDkISSqEjY=\n" +
                  "Endpoint = 95.179.237.55:51820\n" +
                  "AllowedIPs = 0.0.0.0/0\n" +
                  "PersistentKeepalive = 25\n";

              private GoBackend backend;
              private Tunnel tunnel;

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent != null && ACTION_DISCONNECT.equals(intent.getAction())) {
                      disconnect();
                      return START_NOT_STICKY;
                  }
                  connect();
                  return START_STICKY;
              }

              private void connect() {
                  new Thread(() -> {
                      try {
                          backend = new GoBackend(this);
                          Config config = Config.parse(new BufferedReader(new StringReader(WG_CONFIG)));
                          tunnel = new Tunnel() {
                              @Override public String getName() { return "BritishSub"; }
                              @Override public void onStateChange(State state) {
                                  sendBroadcast(new Intent(state == State.UP ?
                                      "com.britishsub.vpn.VPN_CONNECTED" :
                                      "com.britishsub.vpn.VPN_DISCONNECTED"));
                              }
                          };
                          backend.setState(tunnel, Tunnel.State.UP, config);
                      } catch (Exception e) {
                          Log.e(TAG, "Connect error: " + e.getMessage());
                          sendBroadcast(new Intent("com.britishsub.vpn.VPN_DISCONNECTED"));
                          stopSelf();
                      }
                  }).start();
              }

              private void disconnect() {
                  new Thread(() -> {
                      try {
                          if (backend != null && tunnel != null)
                              backend.setState(tunnel, Tunnel.State.DOWN, null);
                      } catch (Exception e) {
                          Log.e(TAG, "Disconnect error: " + e.getMessage());
                      }
                      sendBroadcast(new Intent("com.britishsub.vpn.VPN_DISCONNECTED"));
                      stopSelf();
                  }).start();
              }

              @Override public void onDestroy() { disconnect(); super.onDestroy(); }
          }
          EOF

          cat > britishsub-app/app/src/main/java/com/britishsub/vpn/MainActivity.java << 'EOF'
          package com.britishsub.vpn;

