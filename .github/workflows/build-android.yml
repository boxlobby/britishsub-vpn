                  hamburger.setOnClickListener(v -> openSidebar());

                  LinearLayout logoArea = new LinearLayout(this);
                  logoArea.setOrientation(LinearLayout.HORIZONTAL);
                  logoArea.setGravity(Gravity.CENTER);
                  LinearLayout.LayoutParams logoParams = new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f);
