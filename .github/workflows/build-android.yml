              private BroadcastReceiver vpnReceiver = new BroadcastReceiver() {
                  @Override public void onReceive(Context ctx, Intent intent) {
                      if ("com.britishsub.vpn.VPN_CONNECTED".equals(intent.getAction())) onConnected();
                      else onDisconnected();
                  }
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  macAddress = getMacAddress();

                  IntentFilter f = new IntentFilter();
                  f.addAction("com.britishsub.vpn.VPN_CONNECTED");
                  f.addAction("com.britishsub.vpn.VPN_DISCONNECTED");
