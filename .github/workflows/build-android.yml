name: Build BritishSub VPN APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=BritishSub, O=BritishSub, C=GB"

      - name: Create full project
        run: |
          mkdir -p britishsub-app/app/src/main/java/com/britishsub/vpn
          mkdir -p britishsub-app/app/src/main/res/values
          mkdir -p britishsub-app/gradle/wrapper

          # settings.gradle
          cat > britishsub-app/settings.gradle << 'EOF'
          rootProject.name = "BritishSubVPN"
          include ':app'
          EOF

          # root build.gradle
          cat > britishsub-app/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # app/build.gradle
          cat > britishsub-app/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.britishsub.vpn'
              compileSdk 34
              defaultConfig {
                  applicationId "com.britishsub.vpn"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file(System.getProperty("user.home") + "/.android/debug.keystore")
                      storePassword "android"
                      keyAlias "androiddebugkey"
                      keyPassword "android"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # gradle.properties
          cat > britishsub-app/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # gradle wrapper
          cat > britishsub-app/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # AndroidManifest.xml
          cat > britishsub-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:label="BritishSub VPN"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity.java
          cat > britishsub-app/app/src/main/java/com/britishsub/vpn/MainActivity.java << 'EOF'
          package com.britishsub.vpn;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.LinearLayout;
          import android.graphics.Color;
          import android.view.Gravity;
          import android.content.Intent;
          import android.net.Uri;

          public class MainActivity extends Activity {
              private boolean connected = false;
              private Button connectBtn;
              private TextView statusText;
              private static final String ACCESS_KEY = "ss://Y2hhY2hhMjAtaWV0Zi1wb2x5MTMwNTp0dFhjQk5aYkVRMlllSmlwUkNwV21Y@95.179.237.55:57095/?outline=1";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setGravity(Gravity.CENTER);
                  layout.setBackgroundColor(Color.parseColor("#0F121B"));
                  layout.setPadding(60, 60, 60, 60);

                  TextView title = new TextView(this);
                  title.setText("BritishSub VPN");
                  title.setTextColor(Color.parseColor("#00D7FF"));
                  title.setTextSize(28);
                  title.setGravity(Gravity.CENTER);
                  title.setPadding(0, 0, 0, 40);

                  statusText = new TextView(this);
                  statusText.setText("● Disconnected");
                  statusText.setTextColor(Color.RED);
                  statusText.setTextSize(16);
                  statusText.setGravity(Gravity.CENTER);
                  statusText.setPadding(0, 0, 0, 40);

                  connectBtn = new Button(this);
                  connectBtn.setText("CONNECT");
                  connectBtn.setTextColor(Color.parseColor("#0F121B"));
                  connectBtn.setBackgroundColor(Color.parseColor("#00D7FF"));
                  connectBtn.setTextSize(18);
                  connectBtn.setPadding(60, 30, 60, 30);

                  connectBtn.setOnClickListener(v -> {
                      if (!connected) {
                          Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(ACCESS_KEY));
                          startActivity(intent);
                          connected = true;
                          connectBtn.setText("DISCONNECT");
                          statusText.setText("● Connected");
                          statusText.setTextColor(Color.parseColor("#00D7FF"));
                      } else {
                          connected = false;
                          connectBtn.setText("CONNECT");
                          statusText.setText("● Disconnected");
                          statusText.setTextColor(Color.RED);
                      }
                  });

                  layout.addView(title);
                  layout.addView(statusText);
                  layout.addView(connectBtn);
                  setContentView(layout);
              }
          }
          EOF

          # themes.xml
          cat > britishsub-app/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">#00D7FF</item>
              </style>
          </resources>
          EOF

      - name: Build APK
        run: |
          cd britishsub-app
          gradle assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BritishSub-VPN
          path: britishsub-app/app/build/outputs/apk/release/*.apk
